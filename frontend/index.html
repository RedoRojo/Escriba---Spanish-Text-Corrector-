<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corrector de Español</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ortografia: '#ef4444',
            gramatica: '#f97316',
            puntuacion: '#eab308',
            semantica: '#3b82f6',
            estilo: '#a855f7',
          }
        }
      }
    }
  </script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>" />
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-4 py-6">
      <h1 class="text-2xl font-bold text-gray-900">Corrector de Español</h1>
      <p class="text-gray-500 mt-1">Pega tu texto y obtén un análisis detallado de errores</p>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 space-y-8">
    <!-- Panel 1: Input -->
    <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <label for="text-input" class="block text-sm font-medium text-gray-700 mb-2">
        Texto a analizar
      </label>
      <textarea
        id="text-input"
        rows="8"
        class="w-full border border-gray-300 rounded-lg p-4 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-y"
        placeholder="Escribe o pega aquí tu texto en español..."
      ></textarea>
      <div class="flex items-center justify-between mt-3">
        <span id="counter" class="text-xs text-gray-400">0 caracteres</span>
        <span id="error-message" class="text-xs text-red-500 hidden"></span>
      </div>
      <button
        id="analyze-btn"
        class="mt-4 w-full sm:w-auto px-6 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        Analizar
      </button>
    </section>

    <!-- Loading -->
    <div id="loading" class="hidden text-center py-12">
      <div class="inline-block w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
      <p class="text-gray-500 mt-3">Analizando texto...</p>
    </div>

    <!-- Panel 2: Error Report -->
    <section id="report-panel" class="hidden">
      <div id="summary-bar" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4">
      </div>
      <div id="errors-list" class="space-y-3">
      </div>
    </section>

    <!-- Panel 3: Corrected Text -->
    <section id="corrected-panel" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold text-gray-900">Texto corregido</h2>
        <button
          id="copy-btn"
          class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
        >
          Copiar
        </button>
      </div>
      <div id="corrected-text" class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap"></div>
    </section>
  </main>

  <footer class="border-t border-gray-200 mt-12">
    <div class="max-w-5xl mx-auto px-4 py-4 text-center text-xs text-gray-400">
      Corrector de Español &mdash; Proyecto de portafolio
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
